<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Call</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Home screen ────────────────────────────────────────── -->
  <div id="home-screen" class="screen">
    <div class="card">
      <h1>📹 WebRTC Call</h1>
      <p class="subtitle">Start or join a private 1:1 video call — no account required.</p>

      <button id="start-btn" class="btn btn-primary">Start a Call</button>

      <!-- Shown after "Start a Call" -->
      <div id="code-display" class="hidden">
        <p class="label">Share this code with the other person:</p>
        <div class="code-row">
          <span id="session-code" class="code-text"></span>
          <button id="copy-btn" class="btn btn-ghost" title="Copy to clipboard">📋 Copy</button>
        </div>
        <p id="copy-confirm" class="hidden copy-confirm">Copied!</p>
        <p class="waiting-text">Waiting for the other person to join…</p>
      </div>

      <div class="divider"><span>or</span></div>

      <div class="join-row">
        <input id="code-input" type="text" maxlength="6" placeholder="Enter 6-digit code" autocomplete="off" spellcheck="false" />
        <button id="join-btn" class="btn btn-secondary">Join</button>
      </div>

      <p id="home-error" class="error-msg hidden"></p>
    </div>
  </div>

  <!-- ── Call screen ────────────────────────────────────────── -->
  <div id="call-screen" class="screen hidden">
    <div class="video-container">
      <video id="remote-video" class="video-remote" autoplay playsinline></video>
      <video id="local-video"  class="video-local"  autoplay playsinline muted></video>
    </div>

    <div class="controls">
      <button id="mute-btn"   class="ctrl-btn" title="Mute / Unmute">🎙️</button>
      <button id="hangup-btn" class="ctrl-btn ctrl-btn--red" title="End Call">📵</button>
      <button id="camera-btn" class="ctrl-btn" title="Camera On / Off">📷</button>
    </div>

    <p id="call-status" class="call-status"></p>
  </div>

  <script src="main.js"></script>
</body>
</html>
